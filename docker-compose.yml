services:
  biblia-rapida-bot:
    image: node:20-alpine
    container_name: biblia-rapida-bot
    working_dir: /app
    command: sh -c "npm install && node index.js"
    volumes:
      - ./biblia_rapida_bot:/app
      - ./.env:/app/.env:ro
    env_file:
      - ./.env
    restart: unless-stopped
    networks:
      - app-network

  regra-de-3-bot:
    image: node:20-alpine
    container_name: regra-de-3-bot
    working_dir: /app
    command: sh -c "npm install && node bot.js"
    volumes:
      - ./regra_de_3_bot:/app
      - ./.env:/app/.env:ro
    env_file:
      - ./.env
    restart: unless-stopped
    networks:
      - app-network

  controle-assinaturas-backend:
    image: node:20-alpine
    container_name: controle-assinaturas-backend
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./controle-assinatura_backends:/app
    ports:
      - "8000:8000"
    networks:
      - app-network

  controle-assinatura-bot:
    image: node:20-alpine
    container_name: controle-assinatura-bot
    working_dir: /app
    command: sh -c "npm install && node index.js"
    volumes:
      - ./controle-assinatura-bot:/app
      - ./.env:/app/.env:ro
    env_file:
      - ./.env
    environment:
      - BACKEND_URL=http://controle-assinaturas-backend:8000
    restart: unless-stopped
    depends_on:
      - controle-assinaturas-backend
    networks:
      - app-network

  postgres-atendimento:
    image: postgres:16-alpine
    container_name: postgres-atendimento
    environment:
      POSTGRES_DB: atendimento_clinico
      POSTGRES_USER: atendimento
      POSTGRES_PASSWORD: atendimento123
    ports:
      - "5432:5432"
    volumes:
      - ./atendimento_clinico_backend/banco.sql:/docker-entrypoint-initdb.d/banco.sql
      - pgdata-atendimento:/var/lib/postgresql/data
    networks:
      - app-network

  atendimento-clinico-backend:
    build: ./atendimento_clinico_backend
    container_name: atendimento-clinico-backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgres://atendimento:atendimento123@postgres-atendimento:5432/atendimento_clinico
      - JWT_SECRET=seu-jwt-secret-aqui
      - PORT=8000
    depends_on:
      - postgres-atendimento
    networks:
      - app-network

volumes:
  pgdata-atendimento:

networks:
  app-network:
    driver: bridge
